<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micro-Home · Climate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script defer src="/js/climate.js"></script>
  <script defer src="/js/navbar.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <section class="section">
    <div class="container is-max-tablet">
      <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
          <a class="navbar-item has-text-primary has-text-weight-bold" href="/">
            Micro Home
          </a>
          <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbar-home">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>
        <div id="navbar-home" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item has-text-link" href="/climate">
              Climate
            </a>
            <a class="navbar-item" href="/music">
              Music
            </a>
            <a class="navbar-item" href="/about">
              About
            </a>
          </div>
      </nav>
      <hr>
      <div class="container">
        <div class="columns">
          <div class="column">
            <div class="box border danger">
              <div class="content">
                <h3>Temperature</h3>
                <div class="value has-text-danger is-size-1 has-text-weight-extrabold" id="temp">--<span
                    class="unit"></span>
                  &deg;C</span></div>
              </div>
            </div>
          </div>
          <div class="column">
            <div class="box border info">
              <div class="content">
                <h3>Humidity</h3>
                <div class="value has-text-info is-size-1 has-text-weight-extrabold" id="hum">--<span class="unit">
                    %</span></div>
              </div>
            </div>
          </div>
        </div>
        <div class="box">
          <div class="content">
            <h3>Last 30 readings</h3>
            <div class="chart-wrap">
              <canvas id="chart"></canvas>
            </div>
          </div>
        </div>

      </div>
      <footer class="footer">
        <div class="content has-text-centered">
          <div class="container is-flex is-align-items-center is-justify-content-center" style="gap: 0.5rem">
            <div class="dot is-inline" id="dot"></div>
            <span id="status-text">Connecting...</span>
          </div>
          <p>

            <hr>
            <strong>Micro Home</strong> by <a href="https://aleixmine.github.io">aleixmine</a>.
            The source code is licensed
            <a href="https://opensource.org/license/mit">MIT</a>
          </p>
        </div>
      </footer>
  </section>
  </div>
</body>

</html>
